<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Optinex  Access</title>
  <meta name="description" content="Login to your GoLove account.">
  
  <!-- Fonts: Inter -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
  
  <!-- Icons: FontAwesome -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  
  <!-- Animations: AOS -->
  <link href="https://unpkg.com/aos@2.3.1/dist/aos.css" rel="stylesheet">

  <link rel="stylesheet" href="login.css">
</head>
<body>

  <!-- Background Layers -->
  <div class="global-bg-image"></div>
  <div class="global-glass-overlay"></div>

  <!-- Main Container -->
  <div class="login-container" data-aos="fade-up">
    
    <!-- Header Logo -->
    <a href="index.html" class="brand-logo">
      <img src="golove.png" alt="GoLove logo" onerror="this.style.display='none';document.getElementById('fallbackLogo').style.display='flex';">
      <!-- Fallback text logo if image fails -->
      <div class="brand-logo-icon u-login-001" id="fallbackLogo">G</div>
    </a>

    <!-- MAIN LOGIN FORM -->
    <div id="loginFormWrapper">
      <h1 class="page-title">Welcome Back</h1>
      <p class="page-subtitle">Login to continue</p>

      
      <form method="post" novalidate id="loginForm">
        <div class="form-group">
          <label class="form-label" for="identification">Your Details</label>
          <input type="text" name="username" id="identification" class="form-control" placeholder="Username or Email" value="" required autocomplete="username">
        </div>

        <div class="form-group">
          <label class="form-label" for="loginPassword">Password</label>
          <input type="password" name="password" id="loginPassword" class="form-control" placeholder="Enter your password" required autocomplete="current-password">
          <button type="button" class="pass-toggle" onclick="togglePassword()" aria-label="Toggle password visibility">
            <i class="fas fa-eye" id="passEyeIcon"></i>
          </button>
        </div>

        <div id="loginError" class="alert-box" role="alert" hidden style="display:none;"></div>

        <button type="submit" name="login" class="btn-submit">Let's GO! <i class="fas fa-arrow-right"></i></button>
      </form>

      <div class="form-footer">
        New to Optinex? <a href="register.html">Join Optinex.</a>
      </div>
    </div>

    <!-- RENEW / ACTIVATE PROMPT -->
    <div class="renew-prompt " id="renewPrompt">
      <div class="renew-icon">
        <i class="fas fa-hourglass-end"></i>
      </div>
      
      <h3>Time's Up!</h3>
      
      <p>
        Your access has expired. Renew your subscription now to pick up exactly where you left off.      </p>

      <a href="renew.php%3Fusername=.html" class="btn-renew">
        Renew Account Now <i class="fas fa-arrow-right"></i>
      </a>
      
      <a href="login.html" class="back-btn"><i class="fas fa-arrow-left"></i> Back to Login</a>
    </div>

  </div>

  <script src="https://unpkg.com/aos@2.3.1/dist/aos.js"></script>
  <script>
    // Initialize Animations
    AOS.init({ duration: 800, once: true, offset: 20 });

    // Handle view toggle if prompt is active
    if(document.getElementById('renewPrompt').classList.contains('active')) {
        document.getElementById('loginFormWrapper').style.display = 'none';
    }

    // Fallback Logo Logic: If image fails, show text icon
    const logoImg = document.querySelector('.brand-logo img');
    if (logoImg && logoImg.complete && logoImg.naturalHeight === 0) {
        document.getElementById('fallbackLogo').style.display = 'flex';
    }
    logoImg.addEventListener('error', function() {
        document.getElementById('fallbackLogo').style.display = 'flex';
    });

    // Toggle Password Visibility
    function togglePassword() {
      const input = document.getElementById('loginPassword');
      const icon = document.getElementById('passEyeIcon');
      if (input.type === 'password') { 
        input.type = 'text'; 
        icon.classList.replace('fa-eye', 'fa-eye-slash'); 
      } else { 
        input.type = 'password'; 
        icon.classList.replace('fa-eye-slash', 'fa-eye'); 
      }
    }

    const loginError = document.getElementById('loginError');
    const identificationInput = document.getElementById('identification');
    const passwordInput = document.getElementById('loginPassword');

    function showLoginError(message) {
      if (!loginError) return;
      loginError.innerHTML = `<i class="fas fa-circle-exclamation"></i><span>${message}</span>`;
      loginError.hidden = false;
      loginError.style.display = 'flex';
    }

    function clearLoginError() {
      if (!loginError) return;
      loginError.hidden = true;
      loginError.style.display = 'none';
      loginError.innerHTML = '';
    }

    [identificationInput, passwordInput].forEach(input => {
      input?.addEventListener('input', clearLoginError);
    });

    document.getElementById('loginForm').addEventListener('submit', async function(event) {
      event.preventDefault();
      if (!this.reportValidity()) return;

      const identification = identificationInput.value.trim();
      const password = passwordInput.value;
      const submitButton = this.querySelector('button[type="submit"]');

      clearLoginError();

      if (submitButton) {
        submitButton.disabled = true;
        submitButton.innerHTML = 'Logging in <i class="fas fa-spinner fa-spin"></i>';
      }

      try {
        const API_BASE =
          window.location.protocol === 'file:' ||
          window.location.hostname === 'localhost' ||
          window.location.hostname === '127.0.0.1' ||
          window.location.hostname === ''
            ? 'http://localhost:3000'
            : window.location.origin;

        const response = await fetch(`${API_BASE}/api/login`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ identifier: identification, password })
        });

        const result = await response.json().catch(() => ({}));
        if (!response.ok) throw new Error(result.error || 'Login failed');

        clearLoginError();
        localStorage.setItem('optinexAuthUser', JSON.stringify(result.user));
        window.location.href = 'activation.html?username=' + encodeURIComponent(result.user.username) + '&country=' + encodeURIComponent(result.user.country || 'Nigeria');
      } catch (error) {
        showLoginError(error.message || 'Login failed. Please check your credentials.');
        if (submitButton) {
          submitButton.disabled = false;
          submitButton.innerHTML = 'Let\'s GO! <i class="fas fa-arrow-right"></i>';
        }
      }
    });
  </script>
</body>
</html>
