	<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Dashboard Access - Glamour</title>
  <meta name="description" content="Login to Glamour Dashboard.">
  
  <!-- Fonts: Inter -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
  
  <!-- Icons: FontAwesome -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  
  <!-- Animations: AOS -->
  <link href="https://unpkg.com/aos@2.3.1/dist/aos.css" rel="stylesheet">

  <style>
    /* ==========================================================
       1. GLAMOUR COLOR SYSTEM & VARIABLES
       ========================================================== */
    :root {
      --bg-black: #000000;
      --primary: #09FDB5;
      --gold: #FFD700;
      --white: #ffffff;
      --text-muted: #6b7c72;
      --surface: rgba(255,255,255,0.03);
      --border: rgba(255,255,255,0.08);
      --font-main: 'Inter', sans-serif;
    }

    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
    html, body { width: 100%; height: 100%; overflow-x: hidden; }
    
    body { 
      font-family: var(--font-main); 
      background-color: var(--bg-black); 
      color: var(--white); 
      display: flex; 
      align-items: center; 
      justify-content: center; 
      min-height: 100vh; 
      padding: 20px;
      position: relative;
    }

    /* ==========================================================
       2. BLURRED BACKGROUND IMAGE
       ========================================================== */
    .global-bg-image {
      position: fixed; 
      top: 0; left: 0; width: 100%; height: 100%;
      background: url('https://glamourafrican.top/glamour.jpg') no-repeat center center;
      background-size: cover;
      z-index: -2;
    }
    
    /* Fallback gradient in case image is missing */
    .global-bg-image::after {
      content: '';
      position: absolute;
      inset: 0;
      background: linear-gradient(135deg, #050505 0%, #0a0a0a 50%, #050505 100%);
      z-index: -1;
    }

    .global-glass-overlay {
      position: fixed; 
      top: 0; left: 0; width: 100%; height: 100%;
      background: rgba(0, 0, 0, 0.6); 
      z-index: -1;
      backdrop-filter: blur(25px);
      -webkit-backdrop-filter: blur(25px);
    }

    /* ==========================================================
       3. LOGIN CARD 
       ========================================================== */
    .login-container {
      width: 100%;
      max-width: 440px;
      background: rgba(10, 10, 10, 0.85);
      border-radius: 28px;
      padding: 40px 32px; 
      box-shadow: 0 25px 60px rgba(0, 0, 0, 0.6), 0 0 40px rgba(9, 253, 181, 0.05);
      border: 1px solid var(--border);
      position: relative;
      z-index: 10;
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      overflow: hidden;
    }

    /* Top Gradient Border Effect */
    .login-container::before {
      content: '';
      position: absolute;
      top: 0; left: 0; right: 0;
      height: 2px;
      background: linear-gradient(90deg, transparent, var(--primary), var(--gold), transparent);
      opacity: 0.6;
    }

    /* Logo Area */
    .brand-logo {
      display: flex;
      align-items: center;
      justify-content: center;
      margin-bottom: 10px; 
      text-decoration: none;
    }
    .brand-logo-icon {
      width: 50px;
      height: 50px;
      border-radius: 16px;
      background: linear-gradient(135deg, var(--primary), var(--gold));
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 1.6rem;
      font-weight: 900;
      color: #000;
      box-shadow: 0 8px 20px rgba(9, 253, 181, 0.2);
    }
    .brand-logo img {
      display: block;
      height: 54px; 
      width: auto;
      max-width: 180px;
      object-fit: contain;
    }

    /* Typography */
    .page-title {
      font-size: 1.8rem;
      font-weight: 900;
      color: var(--white);
      text-align: center;
      margin-bottom: 4px;
      letter-spacing: -1px;
    }
    .page-subtitle {
      font-size: 0.9rem;
      color: var(--text-muted);
      text-align: center;
      margin-bottom: 30px; 
      font-weight: 500;
    }

    /* Error Alert */
    .alert-box {
      background: rgba(255, 77, 77, 0.08);
      border: 1px solid rgba(255, 77, 77, 0.2);
      color: #ff4d4d;
      padding: 14px 16px;
      border-radius: 14px;
      margin-bottom: 24px;
      font-size: 0.85rem;
      display: flex;
      align-items: center;
      gap: 12px;
      font-weight: 600;
    }
    .alert-box i { font-size: 1.1rem; }

    /* Form Elements */
    .form-group {
      margin-bottom: 20px;
      position: relative;
    }
    .form-label {
      display: block;
      font-size: 0.75rem;
      font-weight: 700;
      color: var(--text-muted);
      margin-bottom: 8px;
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }
    .form-control {
      width: 100%;
      padding: 16px;
      background: var(--surface);
      border: 2px solid var(--border);
      border-radius: 16px;
      font-family: var(--font-main);
      font-size: 0.95rem;
      font-weight: 600;
      color: var(--white);
      transition: all 0.3s ease;
    }
    .form-control:focus {
      outline: none;
      background: rgba(9, 253, 181, 0.03);
      border-color: var(--primary);
      box-shadow: 0 0 0 4px rgba(9, 253, 181, 0.1);
    }
    .form-control::placeholder {
      color: rgba(255, 255, 255, 0.2);
      font-weight: 400;
    }

    /* Password Toggle */
    .pass-toggle {
      position: absolute;
      right: 16px;
      top: 42px;
      background: none;
      border: none;
      color: var(--text-muted);
      cursor: pointer;
      font-size: 1rem;
      padding: 4px;
      transition: color 0.3s;
    }
    .pass-toggle:hover { color: var(--primary); }

    /* Links */
    .reset-link {
      display: block;
      text-align: right;
      font-size: 0.85rem;
      font-weight: 700;
      color: var(--primary);
      text-decoration: none;
      margin-bottom: 28px;
      transition: 0.2s;
    }
    .reset-link:hover { color: var(--gold); }

    /* Submit Button */
    .btn-submit {
      width: 100%;
      padding: 18px;
      background: linear-gradient(135deg, var(--primary), #00cc8f);
      color: #000;
      border: none;
      border-radius: 16px;
      font-family: var(--font-main);
      font-size: 1.05rem;
      font-weight: 900;
      cursor: pointer;
      transition: all 0.3s ease;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 12px;
      box-shadow: 0 10px 30px rgba(9, 253, 181, 0.2);
    }
    .btn-submit:hover {
      transform: translateY(-2px);
      box-shadow: 0 14px 35px rgba(9, 253, 181, 0.35);
    }
    .btn-submit:active {
      transform: scale(0.98);
    }

    /* Footer */
    .form-footer {
      text-align: center;
      margin-top: 30px;
      font-size: 0.9rem;
      color: var(--text-muted);
      font-weight: 500;
    }
    .form-footer a {
      color: var(--primary);
      font-weight: 800;
      text-decoration: none;
      transition: color 0.2s;
    }
    .form-footer a:hover { color: var(--gold); }

    /* ==========================================================
       4. RENEW / ACTIVATE PROMPT 
       ========================================================== */
    .renew-prompt {
      display: none;
      flex-direction: column;
      align-items: center;
      text-align: center;
      animation: fadeIn 0.4s ease;
    }
    .renew-prompt.active { display: flex; }
    @keyframes fadeIn { from { opacity: 0; transform: scale(0.98); } to { opacity: 1; transform: scale(1); } }
    
    .renew-icon {
      width: 80px;
      height: 80px;
      background: rgba(255, 215, 0, 0.08);
      border: 1px solid rgba(255, 215, 0, 0.2);
      color: var(--gold);
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 2rem;
      margin-bottom: 24px;
    }
    .renew-prompt h3 {
      font-size: 1.6rem;
      font-weight: 900;
      color: var(--white);
      margin-bottom: 12px;
      letter-spacing: -0.5px;
    }
    .renew-prompt p {
      font-size: 0.9rem;
      color: var(--text-muted);
      margin-bottom: 30px;
      line-height: 1.6;
    }
    .btn-renew {
      width: 100%;
      padding: 18px;
      background: linear-gradient(135deg, var(--gold), #FCD34D);
      color: #000;
      border: none;
      border-radius: 16px;
      font-family: var(--font-main);
      font-weight: 900;
      font-size: 1rem;
      text-decoration: none;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 12px;
      box-shadow: 0 10px 30px rgba(255, 215, 0, 0.15);
      transition: all 0.3s ease;
      margin-bottom: 24px;
    }
    .btn-renew:hover {
      transform: translateY(-2px);
      box-shadow: 0 14px 35px rgba(255, 215, 0, 0.3);
    }
    .back-btn {
      font-size: 0.85rem;
      color: var(--text-muted);
      text-decoration: none;
      font-weight: 600;
      transition: 0.2s;
    }
    .back-btn:hover { color: var(--primary); }

    /* Responsive */
    @media (max-width: 480px) {
      .login-container { padding: 30px 20px; }
      .page-title { font-size: 1.5rem; }
    }
  </style>
</head>
<body>

  <!-- Background Layers -->
  <div class="global-bg-image"></div>
  <div class="global-glass-overlay"></div>

  <!-- Main Container -->
  <div class="login-container" data-aos="fade-up">
    
    <!-- Header Logo -->
    <a href="index.html" class="brand-logo">
      <img src="golove.png" alt="Glamour Logo" onerror="this.style.display='none';document.getElementById('fallbackLogo').style.display='flex';">
      <!-- Fallback text logo if image fails -->
      <div class="brand-logo-icon" id="fallbackLogo" style="display:none;">G</div>
    </a>

    <!-- MAIN LOGIN FORM -->
    <div id="loginFormWrapper">
      <h1 class="page-title">Welcome Back</h1>
      <p class="page-subtitle">Login to continue</p>

      
      <form method="post" novalidate id="loginForm">
        <div class="form-group">
          <label class="form-label" for="identification">Your Details</label>
          <input type="text" name="username" id="identification" class="form-control" placeholder="Username or Email" value="" required autocomplete="username">
        </div>

        <div class="form-group">
          <label class="form-label" for="loginPassword">Password</label>
          <input type="password" name="password" id="loginPassword" class="form-control" placeholder="Enter your password" required autocomplete="current-password">
          <button type="button" class="pass-toggle" onclick="togglePassword()" aria-label="Toggle password visibility">
            <i class="fas fa-eye" id="passEyeIcon"></i>
          </button>
        </div>

        <button type="submit" name="login" class="btn-submit">Let's GO! <i class="fas fa-arrow-right"></i></button>
      </form>

      <div class="form-footer">
        New to Glamour? <a href="register.html">Join Glamour.</a>
      </div>
    </div>

    <!-- RENEW / ACTIVATE PROMPT -->
    <div class="renew-prompt " id="renewPrompt">
      <div class="renew-icon">
        <i class="fas fa-hourglass-end"></i>
      </div>
      
      <h3>Time's Up!</h3>
      
      <p>
        Your access has expired. Renew your subscription now to pick up exactly where you left off.      </p>

      <a href="renew.php%3Fusername=.html" class="btn-renew">
        Renew Account Now <i class="fas fa-arrow-right"></i>
      </a>
      
      <a href="login.html" class="back-btn"><i class="fas fa-arrow-left"></i> Back to Login</a>
    </div>

  </div>

  <script src="https://unpkg.com/aos@2.3.1/dist/aos.js"></script>
  <script>
    // Initialize Animations
    AOS.init({ duration: 800, once: true, offset: 20 });

    // Handle view toggle if prompt is active
    if(document.getElementById('renewPrompt').classList.contains('active')) {
        document.getElementById('loginFormWrapper').style.display = 'none';
    }

    // Fallback Logo Logic: If image fails, show text icon
    const logoImg = document.querySelector('.brand-logo img');
    if (logoImg && logoImg.complete && logoImg.naturalHeight === 0) {
        document.getElementById('fallbackLogo').style.display = 'flex';
    }
    logoImg.addEventListener('error', function() {
        document.getElementById('fallbackLogo').style.display = 'flex';
    });

    // Toggle Password Visibility
    function togglePassword() {
      const input = document.getElementById('loginPassword');
      const icon = document.getElementById('passEyeIcon');
      if (input.type === 'password') { 
        input.type = 'text'; 
        icon.classList.replace('fa-eye', 'fa-eye-slash'); 
      } else { 
        input.type = 'password'; 
        icon.classList.replace('fa-eye-slash', 'fa-eye'); 
      }
    }

    document.getElementById('loginForm').addEventListener('submit', function(event) {
      event.preventDefault();
      if (!this.reportValidity()) return;

      const identification = document.getElementById('identification').value.trim() || 'Glamour User';
      window.location.href = 'dashboard.html?username=' + encodeURIComponent(identification);
    });
  </script>
</body>
</html>
