	<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Join GoLove</title>
  <meta name="description" content="Join GoLove. Create your account and start earning today.">
  
  <!-- Fonts: Inter -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
  
  <!-- Icons: FontAwesome -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  
  <!-- Animations: AOS -->
  <link href="https://unpkg.com/aos@2.3.1/dist/aos.css" rel="stylesheet">

  <link rel="stylesheet" href="register.css">
</head>
<body>

  <!-- Background Layers -->
  <div class="global-bg-image"></div>
  <div class="global-glass-overlay"></div>

  <!-- Main Container -->
  <div class="register-container" data-aos="fade-up">
    
    <!-- Header Logo -->
    <a href="index.html" class="brand-logo">
      <img src="golove.png" alt="GoLove logo" onerror="this.style.display='none';document.getElementById('fallbackLogo').style.display='flex';">
      <!-- Fallback text logo if image fails -->
      <div class="brand-logo-icon" id="fallbackLogo">O</div>
    </a>

    <h1 class="page-title">Create Account</h1>
    <p class="page-subtitle">Join Optinex Today. Start earning today.</p>

    
    <form method="post" novalidate id="registerForm">
      <div class="form-row">
        <div class="form-group">
          <input type="text" name="fullname" class="form-control" placeholder="Full Name" required>
          <i class="fas fa-user input-icon"></i>
        </div>
        <div class="form-group">
          <input type="text" name="username" class="form-control" placeholder="Username" required>
          <i class="fas fa-at input-icon"></i>
        </div>
      </div>

      <div class="form-group">
        <input type="email" name="email" class="form-control" placeholder="Email Address" required>
        <i class="fas fa-envelope input-icon"></i>
      </div>

      <div class="form-row">
        <div class="form-group">
          <input type="number" name="phoneNumber" class="form-control" placeholder="Phone Number" required>
          <i class="fas fa-phone input-icon"></i>
        </div>
        <div class="form-group">
          <select name="country" class="form-control" required>
            <option value="" disabled selected>Region</option>
            <option value="International">International</option>
            <optgroup label="Africa">
              <option value="Nigeria">Nigeria</option>
              <option value="Ghana">Ghana</option>
              <option value="Cameroon">Cameroon</option>
              <option value="Kenya">Kenya</option>
              <option value="South Africa">South Africa</option>
            </optgroup>
            <optgroup label="Asia">
              <option value="India">India</option>
              <option value="Philippines">Philippines</option>
            </optgroup>
          </select>
          <i class="fas fa-globe input-icon"></i>
          <i class="fas fa-chevron-down select-arrow"></i>
        </div>
      </div>

      <div class="form-group">
        <input type="text" name="refUsername" class="form-control" placeholder="Referral Username (Optional)" value="">
        <i class="fas fa-user-plus input-icon"></i>
      </div>

      <div class="form-group">
        <input type="password" name="password" id="regPassword" class="form-control" placeholder="Create Password" required>
        <i class="fas fa-lock input-icon"></i>
        <button type="button" class="pass-toggle" onclick="togglePassword('regPassword', 'passEyeIcon')">
            <i class="fas fa-eye" id="passEyeIcon"></i>
        </button>
      </div>

      <!-- Password Strength Meter -->
      <div class="password-strength">
        <div class="strength-bar" id="strengthBar"></div>
      </div>
      <span class="strength-text" id="strengthText">Weak</span>

      <input type="hidden" name="planType" value="plan_a">

      <button type="submit" name="signup" class="btn-submit">
        Create Account <i class="fas fa-arrow-right"></i>
      </button>
    </form>

    <div class="form-footer">
      Already have an account? <a href="login.html">Login here</a>
    </div>
  </div>

  <script src="https://unpkg.com/aos@2.3.1/dist/aos.js"></script>
  <script>
    // Initialize Animations
    AOS.init({ duration: 800, once: true, offset: 20 });

    // Toggle Password Visibility
    function togglePassword(inputId, iconId) {
      const input = document.getElementById(inputId);
      const icon = document.getElementById(iconId);
      if (input.type === "password") { 
        input.type = "text"; 
        icon.classList.replace('fa-eye', 'fa-eye-slash'); 
      } else { 
        input.type = "password"; 
        icon.classList.replace('fa-eye-slash', 'fa-eye'); 
      }
    }

    // Password Strength Logic (Glamour Themed Colors)
    const passwordInput = document.getElementById('regPassword');
    const strengthBar = document.getElementById('strengthBar');
    const strengthText = document.getElementById('strengthText');

    passwordInput.addEventListener('input', function() {
      const val = passwordInput.value;
      let result = 0;
      
      if(val.length > 5) result += 20;
      if(val.length > 7) result += 10;
      if(/[A-Z]/.test(val)) result += 20;
      if(/[0-9]/.test(val)) result += 20;
      if(/[^A-Za-z0-9]/.test(val)) result += 30;

      // Update Bar
      strengthBar.style.width = result + '%';
      
      // Update Color & Text based on Glamour palette
      if (result <= 20) {
        strengthBar.style.backgroundColor = '#ff4d4d'; // Glamour Red
        strengthText.innerText = 'Weak';
        strengthText.style.color = '#ff4d4d';
      } else if (result <= 50) {
        strengthBar.style.backgroundColor = '#e8bf5a'; // Glamour Gold
        strengthText.innerText = 'Fair';
        strengthText.style.color = '#e8bf5a';
      } else if (result <= 80) {
        strengthBar.style.backgroundColor = '#1499e6'; // Glamour Cyan
        strengthText.innerText = 'Good';
        strengthText.style.color = '#1499e6';
      } else {
        strengthBar.style.backgroundColor = '#1499e6'; // Glamour Primary
        strengthText.innerText = 'Strong';
        strengthText.style.color = '#1499e6';
      }
    });

    document.getElementById('registerForm').addEventListener('submit', function(event) {
      event.preventDefault();
      if (!this.reportValidity()) return;

      const username = this.querySelector('input[name="username"]').value.trim() || 'GlamourUser';
      const country = this.querySelector('select[name="country"]').value || 'Nigeria';
      window.location.href = 'dashboard.html?username=' + encodeURIComponent(username) + '&country=' + encodeURIComponent(country);
    });

    const registerParams = new URLSearchParams(window.location.search);
    const referralField = document.querySelector('input[name="refUsername"]');
    const incomingReferral = registerParams.get('refUsername') || registerParams.get('ref') || '';
    if (incomingReferral && referralField) {
      referralField.value = incomingReferral.replace(/\+/g, ' ').trim();
    }
  </script>
</body>
</html>
